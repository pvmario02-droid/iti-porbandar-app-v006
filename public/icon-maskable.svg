<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Background with full coverage for maskable -->
  <rect width="512" height="512" fill="url(#bgGrad)" />
  <!-- Accent Shape -->
  <path d="M 128 128 C 192 64, 320 64, 384 128 C 448 192, 448 320, 384 384 C 320 448, 192 448, 128 384 C 64 320, 64 192, 128 128 Z" fill="none" stroke="#6366f1" stroke-width="8" opacity="0.4" />
  <!-- Monogram text with safe zone padding -->
  <g filter="url(#shadow)" transform="scale(0.85) translate(45, 45)">
    <text x="50%" y="54%" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="160" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" letter-spacing="-4">ITI</text>
    <text x="50%" y="72%" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#e0e7ff" text-anchor="middle" letter-spacing="4" opacity="0.9">PORTAL</text>
  </g>
</svg>
